# -----------------------------------------------------
# General window decoration
# name: "Rounding All Blur"
# -----------------------------------------------------

decoration {
    rounding = 4
    active_opacity = 0.9
    inactive_opacity = 0.5
    fullscreen_opacity = 0.9

    blur {
        enabled = true
        size = 3
        passes = 4
        new_optimizations = on
        ignore_opacity = true
        xray = false
   }
}

layerrule = blur on, ignore_alpha 0, match:namespace waybar 
